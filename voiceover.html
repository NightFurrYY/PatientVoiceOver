<!DOCTYPE html>
<html>
<head>
    <title>Healthcare Speech Recognition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        /* Corner Credit */
        .credit {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 14px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 850px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        select {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
        }

        .buttons {
            margin-bottom: 20px;
        }

        button {
            padding: 12px 18px;
            margin: 8px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start {
            background: #00c9a7;
            color: white;
        }

        .stop {
            background: #ff6b6b;
            color: white;
        }

        .download {
            background: #4d96ff;
            color: white;
        }

        .clear {
            background: #f5a623;
            color: white;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #output {
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 20px;
            min-height: 200px;
            text-align: left;
            overflow-y: auto;
            font-size: 15px;
        }

        .status {
            margin-top: 15px;
            font-weight: bold;
            font-size: 15px;
        }

        /* Mic Pulse Animation */
        .listening {
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 201, 167, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 201, 167, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 201, 167, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>

<body>

<div class="credit">
    by komeshdharun mahendran and ridhimana singh
</div>

<div class="container">

    <h1>🏥 Patient Voice to Medical Notes</h1>

    <select id="language">
        <option value="en-US">English</option>
        <option value="hi-IN">Hindi</option>
        <option value="ta-IN">Tamil</option>
        <option value="te-IN">Telugu</option>
    </select>

    <div class="buttons">
        <button class="start" id="startBtn" onclick="startListening()">Start Recording</button>
        <button class="stop" onclick="stopListening()">Stop Recording</button>
        <button class="download" onclick="downloadReport()">Download Report</button>
        <button class="clear" onclick="clearText()">Clear</button>
    </div>

    <div id="output" contenteditable="true"></div>

    <div class="status" id="status">Status: Idle</div>

</div>

<script>

let recognition;
let isListening = false;
let transcriptData = "";

if ('webkitSpeechRecognition' in window) {

    recognition = new webkitSpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = function() {
        document.getElementById("status").innerText = "Status: Listening...";
        document.getElementById("startBtn").classList.add("listening");
        isListening = true;
    };

    recognition.onresult = function(event) {

        let interim = "";

        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                transcriptData += event.results[i][0].transcript + " ";
            } else {
                interim += event.results[i][0].transcript;
            }
        }

        document.getElementById("output").innerHTML =
            transcriptData + "<span style='opacity:0.6'>" + interim + "</span>";
    };

    recognition.onend = function() {
        if (isListening) recognition.start();
    };

} else {
    alert("Use Google Chrome for Speech Recognition.");
}

function startListening() {
    recognition.lang = document.getElementById("language").value;
    transcriptData = "";
    recognition.start();
}

function stopListening() {
    isListening = false;
    recognition.stop();
    document.getElementById("status").innerText = "Status: Recording Stopped";
    document.getElementById("startBtn").classList.remove("listening");
}

function clearText() {
    transcriptData = "";
    document.getElementById("output").innerHTML = "";
}

function downloadReport() {
    let report = "----- Patient Consultation Report -----\n\n";
    report += document.getElementById("output").innerText;

    const blob = new Blob([report], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Patient_Report.txt";
    link.click();
    link.clickstart.Blob("ridhimanajs@gmail.com");
}

</script>

</body>
</html>
